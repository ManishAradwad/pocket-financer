<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pocket Financer — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0a0a0f; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }

:root {
  --bg:           #0B0D11;
  --surface:      #14171E;
  --surface-2:    #1B1F28;
  --surface-3:    #242936;
  --hairline:     #242936;
  --hairline-soft:#1B1F28;
  --text:         #F4EEE2;
  --text-dim:     #9AA0AD;
  --text-faint:   #5E6472;
  --accent:       #F2A137;
  --accent-2:     #F5B85E;
  --accent-soft:  #3A2810;
  --accent-glow:  rgba(242,161,55,0.18);
  --pos:          #4ADE80;
  --pos-soft:     #10261A;
  --neg:          #F87171;
  --neg-soft:     #2A1212;
}

.phone {
  width: 360px; height: 760px;
  background: var(--bg);
  background-image: radial-gradient(1200px 700px at 10% 0%, #161319 0%, #0A0B0E 55%, #060608 100%);
  border: 2px solid #2a2e3a;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px #1a1e28;
}

.status-bar {
  height: 30px; background: transparent;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; flex-shrink: 0;
}
.status-bar .s-time { font-size: 11px; font-weight: 600; color: var(--text); }
.status-bar .s-icons { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

.screen { position: absolute; inset: 30px 0 60px 0; display: flex; flex-direction: column; overflow: hidden; }
.screen-scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
.screen-scroll::-webkit-scrollbar { display: none; }

/* slide transition */
.screen { transition: opacity 0.22s ease, transform 0.22s ease; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateX(24px); }
.screen.hidden-left { opacity: 0; pointer-events: none; transform: translateX(-24px); }

.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: var(--surface); border-top: 1px solid var(--hairline);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 4px;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 12px; }
.nav-icon { font-size: 20px; color: var(--text-faint); transition: color 0.15s; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text-faint); transition: color 0.15s; }
.nav-item.active .nav-icon,
.nav-item.active .nav-label { color: var(--accent); }

/* ── Shared ── */
.app-header {
  padding: 12px 20px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--text); }
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--surface-2); border: 1px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text-dim); cursor: pointer;
}
.card { margin: 0 16px 14px; background: var(--surface); border: 1px solid var(--hairline); border-radius: 18px; overflow: hidden; }
.card-header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-dim); }
.card-action { font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer; }
.divider { height: 1px; background: var(--hairline-soft); }

/* ══════════════════ HOME ══════════════════ */
.brand { display: flex; align-items: center; gap: 8px; }
.brand-mark {
  width: 30px; height: 30px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #0B0D11;
  box-shadow: 0 2px 8px var(--accent-soft), 0 0 0 1px rgba(242,161,55,0.2);
}
.brand-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--text); }
.settings-btn { width: 34px; height: 34px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-dim); cursor: pointer; }

.hero-zone { padding: 10px 20px 16px; }
.hero-eyebrow { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pos); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(74,222,128,0.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(74,222,128,0)}}
.eyebrow-text { font-size: 13px; color: var(--text-dim); font-weight: 500; }
.hero-amount { display: flex; align-items: baseline; gap: 2px; margin-bottom: 12px; }
.hero-rupee { font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
.hero-number { font-size: 56px; font-weight: 700; color: var(--text); letter-spacing: -2px; line-height: 1; font-variant-numeric: tabular-nums; }
.delta-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; margin-bottom: 8px; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
.delta-pill.good { background: var(--pos-soft); color: var(--pos); border: 1px solid #1a4a2a; }
.delta-pill.bad  { background: var(--neg-soft); color: var(--neg); border: 1px solid #3a1a1a; }
.hero-sub { font-size: 12px; color: var(--text-faint); }

/* sync strip */
.sync-strip { margin: 0 16px 14px; border-radius: 14px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; overflow: hidden; user-select: none; transition: opacity 0.15s; }
.sync-strip:active { opacity: 0.8; }
.sync-strip.pending { background: var(--accent-soft); border: 1px solid rgba(242,161,55,0.28); }
.sync-strip.syncing { background: #1a1a10; border: 1px solid rgba(242,161,55,0.18); }
.sync-strip.done    { background: var(--pos-soft); border: 1px solid rgba(74,222,128,0.18); cursor:default; }
.sync-progress-bg { position:absolute; left:0; top:0; bottom:0; background: rgba(242,161,55,0.08); border-radius: 14px; pointer-events:none; transition: width 0.4s linear; }
.sync-icon-wrap { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.sync-icon-wrap.pending { background: rgba(242,161,55,0.15); }
.sync-icon-wrap.syncing { background: rgba(242,161,55,0.10); }
.sync-icon-wrap.done    { background: rgba(74,222,128,0.12); }
.sync-body { flex: 1; min-width: 0; }
.sync-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.sync-title.pending,.sync-title.syncing { color: var(--accent-2); }
.sync-title.done { color: var(--pos); }
.sync-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.sync-badge { flex-shrink: 0; padding: 3px 9px; border-radius: 20px; font-family: 'JetBrains Mono',monospace; font-size: 11px; font-weight: 600; background: var(--accent); color: #0B0D11; }
@keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
.spin { display:inline-block; animation: spin 1s linear infinite; }

.period-switcher { display:flex; margin: 0 16px 16px; background: var(--surface-2); border-radius: 12px; padding: 4px; border: 1px solid var(--hairline); }
.period-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding: 7px 4px; border-radius: 9px; cursor:pointer; transition: background 0.15s; }
.period-btn.active { background: var(--surface-3); }
.period-label { font-size: 12px; font-weight: 600; color: var(--text-faint); }
.period-btn.active .period-label { color: var(--text); }
.period-amount { font-size: 10px; font-weight: 500; color: var(--text-faint); margin-top: 2px; font-variant-numeric: tabular-nums; }
.period-btn.active .period-amount { color: var(--accent); }

.cat-row { padding: 8px 16px; border-top: 1px solid var(--hairline-soft); }
.cat-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.cat-left { display:flex; align-items:center; gap:7px; }
.cat-emoji { font-size:14px; line-height:1; }
.cat-name { font-size:12px; font-weight:500; color:var(--text); }
.cat-pct  { font-size:10px; color:var(--text-faint); }
.cat-amount { font-size:12px; font-weight:600; color:var(--text-dim); font-variant-numeric:tabular-nums; }
.cat-bar-track { height:4px; background:var(--surface-3); border-radius:2px; overflow:hidden; }
.cat-bar-fill  { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent) 0%,var(--accent-2) 100%); transition: width 0.4s ease; }

.rec-row { padding: 10px 16px; display:flex; align-items:center; gap:11px; border-top: 1px solid var(--hairline-soft); cursor:pointer; transition: background 0.1s; }
.rec-row:first-of-type { border-top:none; }
.rec-row:active { background: var(--surface-2); }
.rec-avatar { width:36px; height:36px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.rec-body { flex:1; min-width:0; }
.rec-merchant { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rec-merchant-vpa { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rec-chip { display:inline-flex; margin-top:3px; padding:1px 6px; border-radius:5px; background:var(--surface-3); font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-faint); }
.rec-right { text-align:right; flex-shrink:0; }
.rec-amount { font-size:13px; font-weight:600; color:var(--text-dim); font-variant-numeric:tabular-nums; }
.rec-amount.credit { color:var(--pos); }
.rec-time { font-size:10px; color:var(--text-faint); margin-top:2px; }

/* ══════════════════ TRANSACTIONS ══════════════════ */
.segment-control { display:flex; background:var(--surface-2); border-radius:10px; padding:3px; margin:10px 16px; }
.segment-btn { flex:1; text-align:center; padding:6px 0; border-radius:8px; font-size:12px; font-weight:500; color:var(--text-faint); cursor:pointer; transition: background 0.15s, color 0.15s; }
.segment-btn.active { background:var(--surface-3); color:var(--text); }

.month-header { padding: 8px 20px 6px; display:flex; align-items:center; justify-content:space-between; border-bottom: 1px solid var(--hairline-soft); }
.month-name { font-family:'Fraunces',serif; font-size:14px; font-weight:500; color:var(--text-dim); }
.month-total { font-size:12px; font-weight:500; color:var(--text-faint); font-variant-numeric:tabular-nums; }
.month-total .r { color:var(--accent); }

.day-hdr { padding:7px 20px 5px; display:flex; align-items:center; justify-content:space-between; border-bottom: 1px solid var(--hairline-soft); background: rgba(11,13,17,0.9); }
.day-lbl { font-size:11px; font-weight:600; color:var(--text-faint); letter-spacing:0.3px; }
.day-lbl.today { color:var(--accent); }
.day-pills { display:flex; gap:5px; }
.dpill { padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; font-variant-numeric:tabular-nums; }
.dpill.debit  { background:var(--neg-soft); color:#d07060; }
.dpill.credit { background:var(--pos-soft); color:var(--pos); }

.txn-row { display:flex; align-items:center; gap:12px; padding:11px 20px; cursor:pointer; transition:background 0.1s; border-bottom:1px solid var(--hairline-soft); }
.txn-row:active { background:var(--surface); }
.txn-avatar { width:38px; height:38px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
.txn-body { flex:1; min-width:0; }
.txn-biz { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.txn-vpa { font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.txn-chip { display:inline-flex; margin-top:3px; padding:1px 7px; border-radius:6px; background:var(--surface-3); border:1px solid var(--hairline); font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--text-faint); }
.txn-right { text-align:right; flex-shrink:0; }
.txn-amt { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; }
.txn-amt.debit  { color:var(--text-dim); }
.txn-amt.credit { color:var(--pos); }
.txn-time { font-size:10px; color:var(--text-faint); margin-top:2px; }

/* detail sheet */
.sheet-overlay { position:absolute; inset:0; z-index:50; background:rgba(0,0,0,0.55); display:flex; flex-direction:column; justify-content:flex-end; }
.sheet { background:var(--surface); border-radius:24px 24px 0 0; border-top:1px solid var(--hairline); max-height:88%; overflow-y:auto; scrollbar-width:none; }
.sheet::-webkit-scrollbar { display:none; }
.sheet-handle-row { display:flex; justify-content:center; padding:12px 0 8px; }
.sheet-handle { width:40px; height:4px; border-radius:2px; background:var(--surface-3); }
.sheet-hero { padding:0 20px 16px; display:flex; gap:14px; align-items:flex-start; }
.sheet-av { width:44px; height:44px; border-radius:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; }
.sheet-hero-body { flex:1; min-width:0; }
.sheet-merchant { font-size:17px; font-weight:600; color:var(--text); line-height:1.25; word-break:break-word; }
.sheet-date { font-size:12px; color:var(--text-faint); margin-top:3px; }
.sheet-amount-col { text-align:right; flex-shrink:0; }
.sheet-amount { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
.chip-row { display:flex; gap:7px; padding:0 20px 16px; flex-wrap:wrap; }
.schip { padding:4px 11px; border-radius:8px; font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px; }
.schip-debit  { background:var(--neg-soft); color:#e08070; border:1px solid #3a2020; }
.schip-credit { background:var(--pos-soft); color:var(--pos); border:1px solid #1a3a2a; }
.schip-acc    { background:var(--surface-2); color:var(--text-faint); border:1px solid var(--hairline); font-family:'JetBrains Mono',monospace; font-size:10px; }
.sheet-div { height:1px; background:var(--hairline); margin:0 20px 14px; }
.sheet-section { padding:0 20px 16px; }
.sec-label { font-size:10px; font-weight:600; letter-spacing:0.8px; color:var(--text-faint); margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
.slm-card { background:var(--bg); border:1px solid var(--hairline); border-radius:12px; overflow:hidden; }
.slm-row { display:flex; gap:8px; align-items:baseline; padding:7px 12px; border-bottom:1px solid var(--hairline-soft); }
.slm-row:last-child { border-bottom:none; }
.slm-k { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-faint); min-width:62px; flex-shrink:0; }
.slm-sep { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-faint); }
.slm-str { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#7ec8a0; }
.slm-num { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#7aabcf; }
.sms-card { background:var(--bg); border:1px solid var(--hairline); border-radius:12px; overflow:hidden; }
.sms-hdr { padding:8px 12px; border-bottom:1px solid var(--hairline-soft); display:flex; align-items:center; gap:8px; }
.sms-from { font-size:10px; color:var(--text-faint); }
.sender-chip { padding:2px 8px; border-radius:6px; background:var(--accent-soft); border:1px solid rgba(242,161,55,0.2); font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--accent-2); }
.sms-body { padding:10px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); line-height:1.6; }

/* ══════════════════ INSIGHTS ══════════════════ */
.section { margin:16px 16px 0; }
.section-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
.section-title { font-size:14px; font-weight:600; color:var(--text); }
.section-sub { font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:500; letter-spacing:0.8px; color:var(--text-faint); }
.trend-card { background:var(--surface); border:1px solid var(--hairline); border-radius:18px; overflow:hidden; padding:16px 16px 0; }
.bar-chart-area { display:flex; align-items:flex-end; gap:6px; height:110px; margin-bottom:8px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; }
.bar-val { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--text-faint); font-variant-numeric:tabular-nums; white-space:nowrap; line-height:1; }
.bar-val.cur { color:var(--accent-2); }
.bar-spacer { flex:1; display:flex; align-items:flex-end; width:100%; }
.bar-fill { width:100%; border-radius:4px 4px 0 0; background:var(--surface-3); }
.bar-fill.cur { background:linear-gradient(180deg,var(--accent-2) 0%,var(--accent) 100%); box-shadow:0 0 12px rgba(242,161,55,0.35); }
.bar-month { font-size:9px; font-weight:500; color:var(--text-faint); padding:4px 0 10px; text-align:center; }
.bar-month.cur { color:var(--accent); font-weight:700; }
.stats-row { display:flex; border-top:1px solid var(--hairline); }
.stat-cell { flex:1; padding:12px 10px; display:flex; flex-direction:column; gap:4px; border-right:1px solid var(--hairline); }
.stat-cell:last-child { border-right:none; }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:500; letter-spacing:0.6px; color:var(--text-faint); }
.stat-value { font-size:13px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
.stat-value.acc { color:var(--accent); }
.mini-toggle { display:flex; gap:4px; }
.mini-tab { padding:3px 9px; border-radius:6px; font-size:10px; font-weight:600; color:var(--text-faint); cursor:pointer; border:1px solid transparent; transition:all 0.15s; }
.mini-tab.active { color:var(--accent); border-color:rgba(242,161,55,0.3); background:var(--accent-soft); }
.merchant-card { background:var(--surface); border:1px solid var(--hairline); border-radius:18px; overflow:hidden; margin-bottom:16px; }
.m-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--hairline-soft); cursor:pointer; transition:background 0.1s; }
.m-row:last-child { border-bottom:none; }
.m-row:active { background:var(--surface-2); }
.m-rank { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; color:var(--text-faint); min-width:18px; }
.m-body { flex:1; min-width:0; }
.m-biz { font-size:12px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-vpa { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-count { font-size:10px; color:var(--text-faint); margin-top:2px; }
.m-bar-track { height:3px; background:var(--surface-3); border-radius:2px; margin-top:4px; overflow:hidden; }
.m-bar-fill { height:100%; border-radius:2px; }
.m-amount { font-size:12px; font-weight:600; color:var(--text-dim); font-variant-numeric:tabular-nums; text-align:right; flex-shrink:0; }
.tail-row { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
.tail-lbl { font-size:11px; color:var(--text-faint); }
.tail-amt { font-size:11px; font-weight:600; color:var(--text-faint); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══ helpers ══ */
const fmt  = n => '₹' + n.toLocaleString('en-IN');
const fmtK = n => n >= 1000 ? `₹${(n/1000).toFixed(1)}K` : `₹${n}`;
const isVpa = m => m && m.includes('@');

const AV_COLORS = [

};

      p += Math.random()*18+8;
      if (p >= 100) { p=100; clearInterval(iv); setTimeout(()=>setSyncState('done'),300); }
      setProgress(Math.min(p,100));
    },300);

  const eyebrow = period==='Day' ? 'Today · Fri, 25 Apr' : period==='Week' ? 'This week · Apr 21–25' : 'This month · April 2026';

        <div key={i} className={getClass(i)}>{s}</div>
      ))}
      <BottomNav tab={tab} setTab={setTab} />

  );
};
