name: Antigravity Branch CI

on:
  push:
    branches:
      - antigravity-branch
  pull_request:
    branches:
      - antigravity-branch
  workflow_dispatch:

# Cancel any in-flight run for the same ref when a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Detect whether only translation files changed so we can skip the
  # expensive Android build when it isn't warranted.
  # ──────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      translation_only: ${{ steps.check.outputs.translation_only }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect translation-only changes
        id: check
        run: |
          # Manual dispatches always run the full pipeline.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "translation_only=false" >> "$GITHUB_OUTPUT"
            echo "Translation only: false (manual dispatch — full pipeline)"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            # For push events, guard against branch with a single commit (no parent).
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          TRANSLATION_ONLY="true"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/locales/*) ;;
              *) TRANSLATION_ONLY="false"; break ;;
            esac
          done <<< "$CHANGED"

          echo "translation_only=$TRANSLATION_ONLY" >> "$GITHUB_OUTPUT"
          echo "Translation only: $TRANSLATION_ONLY"

  # ──────────────────────────────────────────────────────────────────────────
  # Quality gate: l10n, lint, typecheck, and unit tests (with coverage).
  # This runs unconditionally so every commit gets a quality signal.
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Reads the exact version from .nvmrc so the pin is in one place.
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate l10n files
        run: node scripts/validate-l10n.js

      - name: ESLint
        run: yarn lint

      - name: TypeScript typecheck
        run: yarn typecheck

      - name: Unit tests (with 60 % coverage gate)
        # --ci    disables interactive mode and treats warnings as errors.
        # --forceExit  prevents hanging after async test teardown.
        run: yarn test --coverage --ci --forceExit

  # ──────────────────────────────────────────────────────────────────────────
  # Android release build.
  # Runs only after the quality job passes and only when non-translation
  # files changed (identical logic to the main ci.yml).
  # Uses a dummy keystore so the full signing pipeline is exercised in CI
  # without requiring any real credentials.
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: [quality, detect-changes]
    if: needs.detect-changes.outputs.translation_only != 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Automatically caches ~/.gradle so Gradle downloads are not
          # repeated on every run.
          cache: 'gradle'

      # ── Dummy environment setup ───────────────────────────────────────────

      - name: Create dummy google-services.json
        run: |
          cat > android/app/google-services.json << 'EOL'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project-for-ci",
              "storage_bucket": "dummy-project-for-ci.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {
                  "package_name": "com.pocketpalai"
                }
              },
              "api_key": [{
                "current_key": "dummy-api-key-for-ci-builds"
              }]
            }]
          }
          EOL

      - name: Create dummy .env
        run: |
          cat > .env << 'EOL'
          FIREBASE_FUNCTIONS_URL=https://dummy-firebase-url.com
          SUPABASE_URL=https://dummy-supabase-url.supabase.co
          SUPABASE_ANON_KEY=dummy-anon-key-for-ci-builds
          PALSHUB_API_BASE_URL=https://dummy-palshub-api.com
          APP_URL=pocketpal://app
          ENABLE_PALSHUB_INTEGRATION=true
          ENABLE_AUTHENTICATION=true
          ENABLE_OFFLINE_MODE=true
          GOOGLE_IOS_CLIENT_ID=dummy-ios-client-id.apps.googleusercontent.com
          GOOGLE_WEB_CLIENT_ID=dummy-web-client-id.apps.googleusercontent.com
          EOL

      - name: Generate CI keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore pocketpal-release-key.keystore \
            -alias pocketpal_key_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ci-dummy-password \
            -keypass ci-dummy-password \
            -dname "CN=CI Build, OU=CI, O=PocketFinancer, L=CI, S=CI, C=US"

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build Android release APK
        working-directory: android
        env:
          APP_RELEASE_STORE_PASSWORD: ci-dummy-password
          APP_RELEASE_KEY_PASSWORD: ci-dummy-password
        # --no-daemon ensures the Gradle daemon is not left behind after the
        # build, keeping CI runner memory clean.
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Include the run number so artifacts from different runs
          # never collide when downloaded together.
          name: android-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          # 7 days is enough to diagnose failures without bloating storage.
          retention-days: 7
